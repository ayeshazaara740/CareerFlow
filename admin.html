<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | CareerFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body><script defer src="js/back-home.js"></script>
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="index.html">
          <span class="brand-mark">CF</span>
          <span>CareerFlow</span>
        </a>
        <nav class="top-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="jobs.html" class="nav-link">Jobs</a>
          <a href="saved-jobs.html" class="nav-link">Saved</a>
          <a href="admin.html" class="nav-link active">Admin</a>
        </nav>
        <div class="header-actions">
          <a class="btn btn-primary" href="jobs.html">Open Portal</a>
        </div>
      </div>
    </header>

    <main class="container page-shell admin-shell">
      <section class="admin-create reveal">
        <div class="glass-card admin-card">
          <h2 id="form-title">Create Job</h2>
          <form id="job-form" class="admin-form">
            <input type="hidden" id="job-id" />
            <label>Title<input type="text" id="job-title" required /></label>
            <label>Company<input type="text" id="job-company" required /></label>
            <label>Role<input type="text" id="job-role" required /></label>
            <label>Location<input type="text" id="job-location" required /></label>
            <label>Experience<input type="text" id="job-experience" required /></label>
            <label>Salary<input type="number" id="job-salary" required /></label>
            <label>Employment Type<input type="text" id="job-type" required /></label>
            <label>Work Mode<input type="text" id="job-mode" required /></label>
            <label>Category<input type="text" id="job-category" required /></label>
            <label>Skills<input type="text" id="job-skills" required /></label>
            <label>Description<textarea id="job-description-text" rows="4" required></textarea></label>
            <label>Responsibilities<textarea id="job-responsibilities-text" rows="4" required></textarea></label>
            <label>Requirements<textarea id="job-requirements-text" rows="4" required></textarea></label>
            <label>Benefits<textarea id="job-benefits-text" rows="4" required></textarea></label>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save Job</button>
              <button type="button" class="btn btn-secondary" id="reset-form">Reset</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <div class="toast-container" id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
